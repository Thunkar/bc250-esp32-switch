; Two build environments share the same board/USB config:
;   esp32-c3-devkitm-1 -> the real PSU controller (src/main.cpp + config/portal)
;   scanner            -> a throwaway BLE scanner for investigating what the
;                         8BitDo controller advertises (src/ble_scan.cpp)
; build_src_filter keeps exactly one main() per build.
;
; The setup portal's web UI lives in app/index.html and is packed into the
; SPIFFS partition. Flash it with:  pio run -t uploadfs

[platformio]
data_dir = app

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
; Custom table: ~2.75MB app (WiFi + BLE + async web server) + SPIFFS for the UI.
board_build.partitions = partitions.csv
board_build.filesystem = spiffs
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200

[env:esp32-c3-devkitm-1]
build_src_filter = +<*> -<ble_scan.cpp>
lib_deps =
	h2zero/NimBLE-Arduino@^2.2.3
	https://github.com/ESP32Async/ESPAsyncWebServer
	bblanchon/ArduinoJson@^7

[env:scanner]
build_src_filter = +<ble_scan.cpp> -<main.cpp> -<config.cpp> -<portal.cpp>
lib_deps = h2zero/NimBLE-Arduino@^2.2.3
